<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Beyond The Resume{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- MAIN CONTAINER -->
    <div class="container">
        <!-- SIDEBAR NAVIGATION -->
        <aside>
            <div class="nav-logo">
                <img src="{{ url_for('static', filename='images/BTR-Logo Transparent.png') }}" alt="BTR" class="logo-img">
            </div>
            <button class="nav-btn active" onclick="switchPanel('panel-my-resumes', this)">Resumes</button>
            <button class="nav-btn" onclick="switchPanel('panel-bullet-polish', this)">Polish Resume</button>
            <button class="nav-btn" onclick="switchPanel('panel-job-tailor', this)">Tailor Resume</button>
            <button class="nav-btn" onclick="switchPanel('panel-experience', this)">Feedback</button>
        </aside>

        <!-- CONTENT AREA -->
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <!-- PDF.js for viewing PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Set up PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</body>
</html>
