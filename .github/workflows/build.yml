name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: btr-linux
          - os: windows-latest
            asset_name: btr-windows.exe
          - os: macos-latest
            asset_name: btr-macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build executable via PyInstaller
        shell: python
        run: |
          import sys, platform, subprocess
          sep = ";" if platform.system() == "Windows" else ":"
          cmd = [
            sys.executable, "-m", "PyInstaller",
            "--onefile", "--name", "btr",
            f"--add-data=web/dist{sep}web/dist",
          ]
          for mod in [
            "backend.app", "backend.config",
            "backend.services.ollama_service",
            "backend.services.file_service",
            "backend.services.template_service",
            "backend.services.ai_service",
            "backend.services.pdf_service",
            "backend.routes.resume_routes",
            "backend.routes.track_routes",
            "core.resume_analyzer",
          ]:
            cmd.append(f"--hidden-import={mod}")
          cmd.append("btr/cli.py")
          subprocess.check_call(cmd)

      - name: Rename binary for release
        shell: bash
        run: |
          ext=""
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; fi
          mv "dist/btr$ext" "dist/${{ matrix.asset_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel for PyPI
        run: |
          pip install build
          python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*.whl dist/*.tar.gz

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: btr-*
          merge-multiple: true
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
