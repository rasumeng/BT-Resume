name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: btr-linux
          - os: windows-latest
            asset_name: btr-windows.exe
          - os: macos-latest
            asset_name: btr-macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Debug — verify imports before PyInstaller
        shell: bash
        run: |
          python -c "
import sys
print(f'Python: {sys.executable}')
print(f'Version: {sys.version}')
import backend.app as ba
print(f'backend.app: {ba.__file__}')
import backend.config as bc
print(f'backend.config: {bc.__file__}')
import core.resume_analyzer
print('All imports OK')
import web
print(f'web package: {web.__file__}')
"

      - name: Build executable via PyInstaller
        shell: bash
        run: |
          set -e
          SEP=":"
          if [ "$RUNNER_OS" = "Windows" ]; then SEP=";"; fi
          python -m PyInstaller --onefile --name btr \
            --add-data "web/dist${SEP}web/dist" \
            --hidden-import backend.app \
            --hidden-import backend.config \
            --hidden-import backend.services.ollama_service \
            --hidden-import backend.services.file_service \
            --hidden-import backend.services.template_service \
            --hidden-import backend.services.ai_service \
            --hidden-import backend.services.pdf_service \
            --hidden-import backend.routes.resume_routes \
            --hidden-import backend.routes.track_routes \
            --hidden-import core.resume_analyzer \
            btr/cli.py

      - name: Rename binary for release
        shell: bash
        run: |
          ext=""
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; fi
          mv "dist/btr$ext" "dist/${{ matrix.asset_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel for PyPI
        run: |
          pip install build
          python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*.whl dist/*.tar.gz

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: btr-*
          merge-multiple: true
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
